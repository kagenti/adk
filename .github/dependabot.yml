version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 0  # disables non-security updates
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: uv
    directories:
      - /apps/*
      - /agents/*
    schedule:
      interval: daily
    open-pull-requests-limit: 0  # disables non-security updates
    groups:
      uv-security:
        applies-to: security-updates
        patterns:
          - "*"

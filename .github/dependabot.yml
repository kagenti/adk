version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: uv
    directories:
      - /apps/*
      - /agents/*
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      uv-dependencies:
        patterns:
          - "*"

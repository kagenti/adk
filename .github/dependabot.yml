version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule: # required by schema, but redundant with open-pull-requests-limit: 0
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: uv
    directories:
      - /apps/*
      - /agents/*
    schedule: # required by schema, but redundant with open-pull-requests-limit: 0
      interval: weekly
    open-pull-requests-limit: 0

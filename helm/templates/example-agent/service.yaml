{{- if .Values.exampleAgent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: example-agent-svc
  labels:
    app: example-agent
    {{- include "kagenti-adk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.exampleAgent.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: example-agent
    {{- include "kagenti-adk.selectorLabels" . | nindent 4 }}
{{- end }}
